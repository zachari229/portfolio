<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique - Zachari GANDEKON</title>

    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

    <!-- i18next -->
    <script src="https://unpkg.com/i18next@26.0.2/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@3.0.0/i18nextHttpBackend.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../css/boutique.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

    <!-- Header chargé dynamiquement -->
    <div id="header-placeholder"></div>

    <!-- Contenu de la boutique -->

    <section id="about" class="py-16">
        <div class="container">
            <h2 class="section-title animate-on-scroll">À propos de la boutique</h2>

            <div class="cards-grid">

                <div class="card animate-on-scroll">
                    <div class="card-header">
                        <svg class="card-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                        </svg>
                    </div>
                    <div class="card-content">
                        <h3 class="card-description">
                            Nous vous informons que notre boutique est actuellement en cours de construction. Merci!!!
                        </h3>
                    </div>
                </div>

                <!-- Ajoute tes autres cartes ici -->

            </div>
        </div>
    </section>

    <!-- Footer chargé dynamiquement -->
    <div id="footer-placeholder"></div>

    <script>
        async function loadComponent(id, path) {
            const res = await fetch(path);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        }

        loadComponent('header-placeholder', '/header.html');
        loadComponent('footer-placeholder', '/footer.html');
    </script>

    <script src="/js/main.js"></script>
</body>
</html>
